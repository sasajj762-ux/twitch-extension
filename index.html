<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Secret View</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .container { position: relative; width: 100%; max-width: 1000px; margin-top: 20px; }
        iframe, video { width: 100%; aspect-ratio: 16/9; border: none; background: #111; }
        #secret-video { display: none; }
        .btn-toggle {
            margin: 20px; padding: 15px 30px; font-size: 18px; 
            background: #9147ff; color: #fff; border: none; 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn-toggle:hover { background: #772ce8; }
    </style>
</head>
<body>

    <button class="btn-toggle" onclick="toggleSecret()">Увімкнути Секретний Вид</button>

    <div class="container">
        <div id="main-view">
            <iframe src="https://player.twitch.tv/?channel=MedovyiBorsuk&parent=sasajj762-ux.github.io" allowfullscreen></iframe>
        </div>

        <div id="secret-view" style="display:none;">
            <iframe id="secret-iframe" src="" allow="autoplay; camera; microphone"></iframe>
        </div>
    </div>

    <script>
        function toggleSecret() {
            const main = document.getElementById('main-view');
            const secret = document.getElementById('secret-view');
            const iframe = document.getElementById('secret-iframe');
            const btn = document.querySelector('.btn-toggle');

            if (secret.style.display === 'none') {
                // ТУТ ВСТАВ ПОСИЛАННЯ ЯКЕ ДАСТЬ VDO.NINJA
                iframe.src = https://vdo.ninja/?view=yW9JDnd; 
                secret.style.display = 'block';
                main.style.display = 'none';
                btn.innerText = 'Повернутись до стріму';
            } else {
                iframe.src = "";
                secret.style.display = 'none';
                main.style.display = 'block';
                btn.innerText = 'Увімкнути Секретний Вид';
            }
        }
    </script>
</body>
</html>

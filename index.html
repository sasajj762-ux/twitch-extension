<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Stream</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Контейнер для обох відео */
        .video-container { position: relative; width: 100vw; height: 100vh; }

        /* Відео 1 (Twitch) */
        .layer-main { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Відео 2 (VDO.ninja) - Шар поверх */
        #secret-layer { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 10; 
        }

        /* Кнопка перемикання */
        .btn-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            background: #9147ff;
            color: white;
            border: 2px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }
        .btn-toggle:hover { background: #772ce8; scale: 1.05; }
        .btn-active { background: #ff4747 ! extinction; } /* Колір кнопки, коли секрет увімкнено */
    </style>
</head>
<body>

    <button class="btn-toggle" id="toggleBtn" onclick="toggleSecret()">Увімкнути Секретний Вид</button>

    <div class="video-container">
        <div class="layer-main">
            <iframe src="https://player.twitch.tv/?channel=MedovyiBorsuk&parent=sasajj762-ux.github.io" allowfullscreen="true"></iframe>
        </div>

        <div id="secret-layer">
            <iframe id="secret-iframe" src="" allow="autoplay; camera; microphone; fullscreen"></iframe>
        </div>
    </div>

    <script>
        // Твоє посилання, яке ти скинув
        const vdoUrl = "https://vdo.ninja/?view=yW9JDnd";

        function toggleSecret() {
            const layer = document.getElementById('secret-layer');
            const iframe = document.getElementById('secret-iframe');
            const btn = document.getElementById('toggleBtn');

            if (layer.style.display === 'none' || layer.style.display === '') {
                // Вмикаємо секретне відео
                iframe.src = vdoUrl;
                layer.style.display = 'block';
                btn.innerText = 'Повернутись до стріму';
                btn.style.background = '#444'; // Міняємо колір кнопки
            } else {
                // Вимикаємо і повертаємо стрім
                iframe.src = ""; 
                layer.style.display = 'none';
                btn.innerText = 'Увімкнути Секретний Вид';
                btn.style.background = '#9147ff';
            }
        }
    </script>
</body>
</html>
